<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malvinas Collage - Visualizador</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Socket.io and Three.js Libraries -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body style="background-color: #000; margin: 0; overflow: hidden; height: 100vh; width: 100vw;">

  <div class="fullscreen-container">
    <canvas id="fullscreen-canvas"></canvas>
    
    <!-- Floating status indicator to verify synchronization -->
    <div class="sync-watermark">
      <span class="pulse-dot"></span>
      <span>SOCKET SYNC ACTIVE</span>
    </div>
  </div>

  <!-- Inject custom shader classes and execution files -->
  <script src="shaders.js"></script>
  <script src="collage-core.js"></script>
  <script src="display.js"></script>
</body>
</html>
